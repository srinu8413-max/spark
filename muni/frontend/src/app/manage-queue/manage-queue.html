<h2>Manage Queue</h2>

<input [(ngModel)]="name" placeholder="Enter Name">
<button (click)="add()">Add</button>

<br><br>

<button (click)="next()">Call Next</button>

<table>
<tr>
<th>Token</th>
<th>Name</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr *ngFor="let item of queue">
<td>{{item.tokenNumber}}</td>
<td>{{item.name}}</td>
<td>{{item.status}}</td>

<td>
<button (click)="complete(item.id)">Complete</button>
<button (click)="delete(item.id)">Delete</button>
</td>

</tr>

</table>
